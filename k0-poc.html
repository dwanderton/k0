<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>k0 — Live KB Copilot</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23000'/%3E%3Ctext x='32' y='42' font-family='Menlo,monospace' font-size='28' font-weight='700' fill='%23fff' text-anchor='middle'%3Ek0%3C/text%3E%3C/svg%3E">
<style>
  :root {
    /* k0 brand — Geist-derived, v0-style: black wordmark, white paper, gray scale, Vercel blue accent */
    --ink: #000000;
    --paper: #fafafa;
    --line: #eaeaea;
    --muted: #666666;
    --frag: #d7e6ff;            /* Chrome's text-fragment highlight tint (functional mimicry — keep) */
    --frag-ink: #0b3ea8;
    --card: #ffffff;
    --accent: #0070f3;          /* Vercel blue */
    --live: #0a7d33;
    --font-sans: "Geist", "Geist Sans", Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font: 15px/1.55 var(--font-sans);
    background: var(--paper);
    color: var(--ink);
    padding: 32px 20px 48px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }

  header { margin-bottom: 26px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo {
    width: 34px; height: 34px; border-radius: 8px; background: var(--ink); color: #fff;
    font: 700 15px/34px var(--font-mono); text-align: center; letter-spacing: -.02em;
    user-select: none;
  }
  h1 { font-size: 26px; letter-spacing: -.02em; font-weight: 700; }
  h1 .hl { background: var(--frag); color: var(--frag-ink); padding: 0 5px; border-radius: 3px; }

  .stage {
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 26px;
  }
  @media (max-width: 760px) { .stage { grid-template-columns: 1fr; } }

  .pane {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    display: flex; flex-direction: column; min-height: 420px;
  }
  .pane-head {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    font: 600 12px/1 var(--font-mono);
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .pane-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 460px; }

  /* conversation */
  .msg { max-width: 92%; }
  .msg .who {
    font: 600 11px/1 var(--font-mono);
    color: var(--muted); margin-bottom: 4px;
  }
  .msg .bubble {
    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background: #fff;
  }
  .msg.sa .bubble { background: #f4f4f5; }

  button.next {
    align-self: flex-start; margin-top: auto;
    font: 600 14px/1 inherit; color: #fff; background: var(--ink);
    border: 0; border-radius: 8px; padding: 11px 16px; cursor: pointer;
  }
  button.next:hover { background: #333; }
  button.next:disabled { background: var(--line); color: var(--muted); cursor: default; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* transport */
  .transport { display: flex; align-items: center; gap: 6px; }
  .transport button {
    font: 600 13px/1 var(--font-mono);
    width: 30px; height: 26px; border: 1px solid var(--line); border-radius: 6px;
    background: #fff; color: var(--ink); cursor: pointer;
  }
  .transport button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .transport button:disabled { color: var(--line); cursor: default; }
  .transport button.following { border-color: var(--live); color: var(--live); }
  .transport .count {
    font: 600 11px/1 var(--font-mono);
    color: var(--muted); min-width: 34px; text-align: center;
  }

  /* carousel state line */
  .mode {
    font: 600 11px/1 var(--font-mono);
    letter-spacing: .08em; text-transform: uppercase;
  }
  .mode.live { color: var(--live); }
  .mode.paused { color: var(--muted); }
  .mode .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: currentColor; margin-right: 6px; vertical-align: 1px; }

  /* suggestion set (one shown at a time) */
  .empty { color: var(--muted); font-size: 14px; padding: 8px 2px; }
  .set { display: flex; flex-direction: column; gap: 10px; animation: rise .2s ease both; }
  @media (prefers-reduced-motion: reduce) { .set, .card { animation: none !important; } }
  @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
  .set .set-label {
    font: 600 10px/1 var(--font-mono);
    letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
  }
  .set .heard {
    font-size: 13px; color: var(--muted); border-left: 2px solid var(--line); padding-left: 10px;
  }

  .card {
    border: 1px solid var(--accent); border-radius: 8px; padding: 12px 14px; background: #fff;
  }
  .card .doc {
    font: 600 11px/1 var(--font-mono);
    color: var(--muted); margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .card .badge {
    font: 600 10px/1 var(--font-mono);
    letter-spacing: .04em;
    color: var(--live); background: #e7f5ec; border: 1px solid #c4e5d1;
    border-radius: 9999px; padding: 3px 8px; white-space: nowrap;
  }
  .card .passage { margin-bottom: 2px; }
  .card .passage mark { background: var(--frag); color: var(--frag-ink); padding: 1px 3px; border-radius: 3px; }
  .card .fraglink { text-decoration: none; cursor: pointer; }
  .card .fraglink:hover mark { background: #c2d9ff; text-decoration: underline; text-underline-offset: 2px; }
  .card .fraglink:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }

  .status {
    margin-top: 18px; border: 1px dashed var(--line); border-radius: 8px;
    padding: 12px 14px; font: 13px/1.5 var(--font-mono);
    color: var(--muted); background: #fff;
  }
  .status b { color: var(--ink); }

</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true">k0</div>
    </div>
    <h1>Knowledge that <span class="hl">follows your voice</span></h1>
  </header>

  <div class="stage">
    <section class="pane" aria-label="Conversation">
      <div class="pane-head"><span>Live call — your side (SA mic)</span><span id="turn">0 / 3</span></div>
      <div class="pane-body" id="chat">
        <button class="next" id="next">Next Line</button>
      </div>
    </section>

    <section class="pane" aria-label="k0 suggestions">
      <div class="pane-head">
        <span class="mode live" id="mode"><span class="dot"></span>Listening</span>
        <div class="transport" role="group" aria-label="Browse suggestion turns">
          <button id="older" title="Previous turn" aria-label="Previous turn">&lt;</button>
          <button id="playpause" class="following" title="Follow live / pause on this card" aria-label="Follow live or pause">&#10073;&#10073;</button>
          <button id="newer" title="Next turn" aria-label="Next turn">&gt;</button>
          <span class="count" id="setCount">–/–</span>
        </div>
      </div>
      <div class="pane-body" id="cards">
        <p class="empty" id="emptyNote">Start the conversation — k0 surfaces knowledge as you talk.</p>
      </div>
    </section>
  </div>

  <div class="status" id="status">
    docs window: <b>not opened yet</b>
  </div>

</div>

<script>
  const script = [
    {
      who: "You (SA)",
      text: "So your worry is paying for idle compute — what actually happens to your functions when traffic drops to nothing overnight.",
      card: {
        doc: "vercel.com/docs/functions",
        section: "Functions · Scaling",
        confidence: "High Confidence",
        before: "Vercel only keeps as many active functions as needed to handle your traffic. ",
        anchor: "Vercel scales your functions down to zero",
        after: " when there are no incoming requests.",
        url: "https://vercel.com/docs/functions#:~:text=Vercel%20scales%20your%20functions%20down%20to%20zero"
      }
    },
    {
      who: "You (SA)",
      text: "Right — your team got burned by cold starts on Lambda, so the real question is how Vercel handles cold starts differently.",
      card: {
        doc: "vercel.com/docs/functions",
        section: "Functions · Fluid compute",
        confidence: "High Confidence",
        before: "Fluid compute: ",
        anchor: "Reduced cold starts, lower latency",
        after: ", and lower costs via optimized concurrency.",
        url: "https://vercel.com/docs/functions#:~:text=Reduced%20cold%20starts%2C%20lower%20latency"
      }
    },
    {
      who: "You (SA)",
      text: "And on the compliance side you're asking where these functions physically run by default.",
      card: {
        doc: "vercel.com/docs/functions",
        section: "Functions · Regions",
        confidence: "High Confidence",
        before: "By default, functions using the Node.js runtime ",
        anchor: "execute in Washington, D.C., USA",
        after: " (iad1); you can set a new region in project settings.",
        url: "https://vercel.com/docs/functions#:~:text=execute%20in%20Washington%2C%20D.C."
      }
    }
  ];

  const chat = document.getElementById("chat");
  const cards = document.getElementById("cards");
  const nextBtn = document.getElementById("next");
  const turnEl = document.getElementById("turn");
  const statusEl = document.getElementById("status");
  const olderBtn = document.getElementById("older");
  const newerBtn = document.getElementById("newer");
  const playBtn = document.getElementById("playpause");
  const setCount = document.getElementById("setCount");
  const modeEl = document.getElementById("mode");

  let turn = 0, navs = 0;
  const sets = [];          // oldest -> newest
  let view = -1;            // index of the set currently displayed
  let following = true;     // play = keep up with the live call (default ON)

  function render() {
    const emptyNote = document.getElementById("emptyNote");
    if (sets.length && emptyNote) emptyNote.remove();

    // Only swap the DOM when the visible card actually changes —
    // re-appending the same element would restart its entrance animation.
    const shown = cards.querySelector(".set");
    const target = (view >= 0 && sets[view]) ? sets[view].el : null;
    if (shown !== target) {
      if (shown) shown.remove();
      if (target) cards.appendChild(target);
    }

    setCount.textContent = sets.length ? (view + 1) + "/" + sets.length : "–/–";
    olderBtn.disabled = view <= 0;
    newerBtn.disabled = view >= sets.length - 1;

    const behind = sets.length - 1 - view;
    if (following) {
      modeEl.className = "mode live";
      modeEl.innerHTML = '<span class="dot"></span>Live';
      playBtn.classList.add("following");
      playBtn.innerHTML = "&#10073;&#10073;";
      playBtn.title = "Pause on this card";
    } else {
      modeEl.className = "mode paused";
      modeEl.innerHTML = '<span class="dot"></span>Paused' + (behind > 0 ? " · " + behind + " newer" : "");
      playBtn.classList.remove("following");
      playBtn.innerHTML = "&#9654;";
      playBtn.title = "Resume following the live call";
    }
  }

  function buildSet(step, n) {
    const setEl = document.createElement("div");
    setEl.className = "set";
    setEl.innerHTML =
      '<div class="set-label">Turn ' + n + ' &middot; heard from your mic</div>' +
      '<div class="heard">&ldquo;' + step.text + '&rdquo;</div>';
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      '<div class="doc"><span>' + step.card.doc + ' &middot; ' + step.card.section + '</span>' +
      '<span class="badge">' + step.card.confidence + '</span></div>' +
      '<div class="passage">' + step.card.before +
      '<a class="fraglink" href="' + step.card.url + '" title="Open in Vercel docs"><mark>' + step.card.anchor + '</mark></a>' +
      step.card.after + '</div>';
    card.querySelector(".fraglink").addEventListener("click", (e) => { e.preventDefault(); openDocs(step.card.url); });
    setEl.appendChild(card);
    return setEl;
  }

  nextBtn.addEventListener("click", () => {
    if (turn >= script.length) return;
    const step = script[turn];

    const msg = document.createElement("div");
    msg.className = "msg sa";
    msg.innerHTML = '<div class="who">' + step.who + '</div><div class="bubble">' + step.text + '</div>';
    chat.insertBefore(msg, nextBtn);

    sets.push({ el: buildSet(step, turn + 1) });
    if (following) view = sets.length - 1;   // live: newest suggestion is shown as it lands
                                             // paused: hold the current card; counter shows how many newer
    turn++;
    turnEl.textContent = turn + " / " + script.length;
    if (turn >= script.length) { nextBtn.disabled = true; nextBtn.textContent = "End of Scripted Call"; }
    render();
  });

  playBtn.addEventListener("click", () => {
    following = !following;
    if (following) view = sets.length - 1;   // resuming live snaps to the newest card
    render();
  });
  olderBtn.addEventListener("click", () => {
    if (view > 0) { view--; following = false; render(); }
  });
  newerBtn.addEventListener("click", () => {
    if (view < sets.length - 1) { view++; following = false; render(); }
  });

  function openDocs(url) {
    // The whole trick: a NAMED target. First click opens the popup;
    // every later click is a top-level navigation of that same window,
    // so the text fragment fires and the highlight lands.
    const win = window.open(url, "k0Docs", "width=1100,height=800");
    navs++;
    statusEl.innerHTML = "docs window: <b>" + (navs === 1 ? "opened" : "reused") + "</b> — navigations so far: <b>" + navs + "</b>" +
      (win ? "" : " · <b>popup blocked</b> — allow popups for this page and click again.");
  }

  render();
</script>
</body>
</html>
